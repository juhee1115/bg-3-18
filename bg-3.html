<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      *+{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      #container {
        width: 2000px;
        margin: 50px auto;
        display: flex;
        gap: 10px;
      }
      .box {
        border: 1px solid #222;
        width: 300px;
        height: 300px;
        flex: 1;
        background: url(images/5.jpg) no-repeat left top;
      }
      #bg1 {
        background-size: auto;
      }
      #bg2 {
        background-size: 200px;
         /* 너비는 200px, 높이는 자동계산 */
      }
       #bg3 {
        background-size: 50%;
         /* 너비는 200px, 높이는 자동계산 */
      }
       #bg4 {
        background-size: 100% 100%;
         /* 너비는 200px, 높이는 자동계산 */
      }
         #bg5 {
        background-size: contain;
         /*요소안에 높이가 다 보이게 */
      }
          #bg6 {
        background-size: contain;
         /*요소안에 높이가 다 보이게 */
      }


    </style>
  </head>
  <body>
    <div id="container">
      <div class="box" id="bg1"></div>
      <div class="box" id="bg2"></div>
      <div class="box" id="bg3"></div>
      <div class="box" id="bg4"></div>
      <div class="box" id="bg5"></div>
      <div class="box" id="bg6"></div>
    </div>
  </body>
</html>
